<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>DSI Org Banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #EFE7D6;
    --ink: #1C1A19;
    --ink-soft: #3D3A37;
    --ink-mute: #5E5852;
    --uw-red: #C5050C;
  }
  html, body { margin: 0; padding: 0; background: var(--cream); }
  body { font-family: 'Red Hat Display', system-ui, sans-serif; color: var(--ink); }
  .banner {
    width: 1280px; height: 320px;
    position: relative; overflow: hidden;
    background: var(--cream);
  }
  .dot-grid {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, var(--ink) 1.2px, transparent 1.2px);
    background-size: 20px 20px;
    opacity: 0.05; pointer-events: none;
  }
  .ruler { position: absolute; left: 64px; right: 64px; height: 1px; background: var(--ink); opacity: 0.18; }
  .ruler.top { top: 56px; }
  .ruler.bot { bottom: 56px; }

  .header {
    position: absolute; top: 24px; left: 64px; right: 64px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-soft);
  }
  .header b { color: var(--ink); font-weight: 500; }
  .pill { border: 1px solid var(--ink); border-radius: 999px; padding: 4px 12px; color: var(--ink); font-size: 11px; }

  .body {
    position: absolute; left: 64px; right: 64px; top: 88px; bottom: 88px;
    display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 40px;
  }
  .greeting h1 {
    font-family: 'Red Hat Display', sans-serif;
    font-weight: 900; font-size: 64px;
    line-height: 0.92; letter-spacing: -0.035em;
    margin: 0; color: var(--ink);
  }
  .greeting h1 .red { color: var(--uw-red); }
  .greeting .lede {
    margin-top: 8px;
    font-family: 'Red Hat Display', sans-serif;
    font-size: 17px; font-weight: 500; line-height: 1.4;
    color: var(--ink-soft);
    max-width: 620px;
  }
  .stats {
    display: grid; grid-template-rows: 1fr 1fr; gap: 12px;
    text-align: right;
    border-left: 1px dashed var(--ink-mute);
    padding-left: 32px;
  }
  .stat .n {
    font-family: 'Red Hat Display', sans-serif;
    font-weight: 900; font-size: 36px; line-height: 1;
    letter-spacing: -0.02em; color: var(--ink);
    font-variant-numeric: tabular-nums;
  }
  .stat .n.red { color: var(--uw-red); }
  .stat .l {
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--ink-mute);
  }

  .footer {
    position: absolute; bottom: 24px; left: 64px; right: 64px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-soft);
  }
  .footer b { color: var(--ink); font-weight: 500; }
</style>
</head>
<body>
<div class="banner" id="banner">
  <div class="dot-grid"></div>
  <div class="ruler top"></div>
  <div class="ruler bot"></div>

  <div class="header">
    <span>github · <b>UW-Madison-DSI</b></span>
    <span class="pill">Field Notes</span>
    <span><b>est. 2022</b></span>
  </div>

  <div class="body">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="88" height="88" aria-hidden="true">
      <g fill="#1C1A19">
        <circle cx="10" cy="10" r="3"/><circle cx="22" cy="10" r="3"/><circle cx="34" cy="10" r="3"/><circle cx="46" cy="10" r="3"/>
        <circle cx="10" cy="22" r="3"/><circle cx="22" cy="22" r="3"/><circle cx="34" cy="22" r="3"/><circle cx="46" cy="22" r="3"/>
        <circle cx="10" cy="46" r="3"/><circle cx="22" cy="46" r="3"/><circle cx="34" cy="46" r="3"/><circle cx="46" cy="46" r="3"/>
      </g>
      <rect x="7" y="31" width="42" height="6" rx="3" fill="#C5050C"/>
    </svg>
    <div class="greeting">
      <h1>Data Science Institute<span class="red">.</span></h1>
      <div class="lede">Code, models, and tools from researchers across UW-Madison — turning data into discovery, across every field.</div>
    </div>
    <div class="stats">
      <div class="stat"><div class="n red" id="stat-repos">42</div><div class="l">Active repos</div></div>
      <div class="stat"><div class="n" id="stat-contributors">186</div><div class="l">Contributors</div></div>
    </div>
  </div>

  <div class="footer">
    <span>dsi · <b>wisc.edu</b></span>
    <span>UW–Madison, since <b>1848</b></span>
  </div>
</div>
</body>
</html>
